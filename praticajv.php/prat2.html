<!DOCTYPE html>
<html>
    <meta charset="UTF-8">
<head>
    <title>Prática 2</title>
</head>
<body>
<h1>Aperte o botão calocular para realizar o cálculo.</h1>
<button onclick="calcular()">Calcular</button>

<script>
function calcular() {
    let n1 = Number(prompt("Digite o primeiro número:"));
    let n2 = Number(prompt("Digite o segundo número:"));

    let soma = n1 + n2;
    let mult = n1 * n2;

    alert("Soma: " + soma);
    alert("Multiplicação: " + mult);
}
</script>

</body>
</html>
